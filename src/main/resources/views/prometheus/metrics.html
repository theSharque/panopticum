<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>

    <div class="toolbar">
        <h1 th:text="${msg['prometheus.metricsTitle']}">Metrics</h1>
        <a th:href="@{/prometheus/{id}/query(id=${connectionId})}" class="btn" th:text="${msg['prometheus.queryTitle']}">Query</a>
    </div>

    <form method="get" class="filter-form">
        <input type="hidden" name="page" value="1">
        <div class="form-group--inline">
            <label for="job-filter" th:text="${msg['prometheus.job']}">Job</label>
            <select id="job-filter" name="job" class="filter-select" onchange="this.form.submit()">
                <option value="" th:selected="${selectedJob == null or selectedJob.isEmpty()}">— all —</option>
                <option th:each="j : ${jobs}" th:value="${j}" th:text="${j}"
                        th:selected="${j == selectedJob}"></option>
            </select>
        </div>
    </form>

    <div th:if="${metrics != null and !metrics.isEmpty()}" class="query-result-data">
        <div class="query-pagination-info">
            <span class="query-pagination-nav">
                <th:block th:with="prevUrl=@{/prometheus/{id}/metrics(id=${connectionId},job=${selectedJob},page=${page - 1},size=${size})}, nextUrl=@{/prometheus/{id}/metrics(id=${connectionId},job=${selectedJob},page=${page + 1},size=${size})}, prevLabel=${msg['common.prev']}, nextLabel=${msg['common.next']}">
                    <th:block th:replace="~{fragments/pagination-list-nav :: arrows(hasPrev=${hasPrev}, prevUrl=${prevUrl}, hasMore=${hasMore}, nextUrl=${nextUrl}, prevLabel=${prevLabel}, nextLabel=${nextLabel})}" />
                </th:block>
            </span>
            <span class="query-pagination-range" th:text="${msg['common.rowsRange'] + fromRow + '–' + toRow}" th:if="${fromRow != null and toRow != null}"></span>
        </div>
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th" th:text="${msg['prometheus.metric']}">Metric</th>
                        <th class="query-th" th:text="${msg['prometheus.job']}">Job</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${metrics}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="@{/prometheus/{id}/query(id=${connectionId},promql=${m.name})}"
                               class="btn btn--icon btn--ghost">
                                <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                            </a>
                        </td>
                        <td th:text="${m.name}" class="query-cell-mono"></td>
                        <td th:text="${m.job}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p th:if="${metrics == null or metrics.isEmpty()}" class="text-dim" th:text="${msg['prometheus.noMetrics']}"></p>
</main>
</body>
</html>
