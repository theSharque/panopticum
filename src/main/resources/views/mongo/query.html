<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <section class="query-panel query-panel-table">
        <form th:action="@{/mongo/{id}/{dbName}/{collection}/query(id=${connectionId}, dbName=${dbName}, collection=${collection})}"
              method="post"
              th:attr="hx-post=@{/mongo/{id}/query(id=${connectionId})}"
              hx-target="#table-data"
              hx-swap="outerHTML"
              class="query-form">
            <input type="hidden" name="dbName" th:value="${dbName}"/>
            <input type="hidden" name="collection" th:value="${collection}"/>
            <input type="hidden" name="offset" value="0"/>
            <input type="hidden" name="limit" th:value="${size}"/>
            <input type="hidden" name="target" value="table"/>
            <textarea name="query" class="query-textarea" data-lang="json" rows="4" th:text="${query}" th:attr="placeholder=${msg['query.placeholderMongo']}">{}</textarea>
            <button type="submit" class="btn btn--icon btn--primary query-execute" th:attr="aria-label=${msg['query.refresh']}, title=${msg['query.refresh']}">
                <svg class="icon icon--lg" aria-hidden="true"><use href="#icon-refresh"/></svg>
            </button>
        </form>
    </section>

    <div th:replace="~{partials/mongo-table-view-result}"></div>
</main>
</body>
</html>
