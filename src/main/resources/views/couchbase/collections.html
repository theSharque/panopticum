<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['couchbase.collectionsTitle']}">Scopes and collections</h1>
    <div th:if="${scopes != null and !scopes.isEmpty()}">
        <div th:each="sc : ${scopes}" class="query-result-data" style="margin-bottom: 2rem;">
            <h2 th:text="${sc.scopeName}">scope</h2>
            <ul class="sidebar-nav" style="list-style: none; padding-left: 0;">
                <li th:each="cname : ${sc.collectionNames}">
                    <a th:href="@{/couchbase/{id}/{bucket}/{scope}/{collection}(id=${connectionId}, bucket=${bucket}, scope=${sc.scopeName}, collection=${cname})}"
                       th:text="${cname}">collection</a>
                </li>
            </ul>
        </div>
    </div>
    <p th:if="${scopes == null or scopes.isEmpty()}" class="text-dim" th:text="${msg['couchbase.noCollections']}">No collections.</p>
</main>
</body>
</html>
