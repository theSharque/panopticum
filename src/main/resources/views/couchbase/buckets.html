<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['couchbase.bucketsTitle']}">Buckets</h1>
    <p><a class="sidebar-link" th:href="@{/couchbase/{id}/query(id=${connectionId})}" th:text="${msg['couchbase.n1qlEditor']}">N1QL</a></p>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-pagination-info">
            <span class="query-pagination-nav">
                <th:block th:with="prevUrl=@{/couchbase/{id}/buckets(id=${connectionId}, page=${page - 1}, size=${size}, sort=${sort}, order=${order})}, nextUrl=@{/couchbase/{id}/buckets(id=${connectionId}, page=${page + 1}, size=${size}, sort=${sort}, order=${order})}, prevLabel=${msg['common.prev']}, nextLabel=${msg['common.next']}">
                    <th:block th:replace="~{fragments/pagination-list-nav :: arrows(hasPrev=${hasPrev}, prevUrl=${prevUrl}, hasMore=${hasMore}, nextUrl=${nextUrl}, prevLabel=${prevLabel}, nextLabel=${nextLabel})}" />
                </th:block>
            </span>
            <span class="query-pagination-range" th:text="${msg['common.rowsRange'] + fromRow + '–' + toRow}"></span>
        </div>
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/couchbase/{id}/buckets(id=${connectionId}, page=1, size=${size}, sort='name', order=${orderName})}" class="query-th-link"><span th:text="${msg['common.name']}">Name</span></a>
                        </th>
                        <th th:text="${msg['common.type']}">Type</th>
                        <th th:text="${msg['couchbase.ramQuota']}">RAM MB</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="@{/couchbase/{id}/{bucket}/collections(id=${connectionId}, bucket=${item.name})}"
                               class="btn btn--icon btn--ghost" th:attr="aria-label=${msg['common.open']}, title=${msg['common.open']}">
                                <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                            </a>
                        </td>
                        <td th:text="${item.name}"></td>
                        <td th:text="${item.bucketType}"></td>
                        <td th:text="${item.ramQuotaMb}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['couchbase.noBuckets']}">No buckets.</p>
</main>
</body>
</html>
