<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['couchbase.documentTitle']}">Document</h1>
    <form th:action="@{/couchbase/{id}/{bucket}/{scope}/{collection}/detail(id=${connectionId}, bucket=${bucket}, scope=${scope}, collection=${collection})}" method="post" class="detail-form">
        <input type="hidden" name="documentId" th:value="${documentId}"/>
        <div class="detail-field">
            <div class="detail-field-name">ID</div>
            <div class="detail-field-value query-cell-mono" th:text="${documentId}">id</div>
        </div>
        <textarea name="body" class="detail-json detail-json-textarea" data-detail-editor="json" th:text="${prettyJson}"></textarea>
        <div class="detail-actions">
            <button type="submit" class="btn btn--primary" th:text="${msg['common.save']}">Save</button>
            <button th:if="${dataDiffPayload != null}" type="button" class="btn btn--primary data-diff-add"
                    th:attr="data-diff-payload=${dataDiffPayload}, data-diff-added-text=${msg['diff.added']}"
                    th:text="${msg['diff.addToCompare']}">Add to comparison</button>
        </div>
    </form>
</main>
</body>
</html>
