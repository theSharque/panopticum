<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['couchbase.documentsTitle']}">Documents</h1>
    <div class="query-pagination-info" th:if="${columns != null and !columns.isEmpty()}">
        <span class="query-pagination-nav">
            <a th:if="${hasPrev}" th:href="@{/couchbase/{id}/{bucket}/{scope}/{collection}(id=${connectionId}, bucket=${bucket}, scope=${scope}, collection=${collection}, offset=${prevOffset}, limit=${limit})}" th:text="${msg['common.prev']}">Back</a>
            <span th:if="${hasMore}">
                <a th:href="@{/couchbase/{id}/{bucket}/{scope}/{collection}(id=${connectionId}, bucket=${bucket}, scope=${scope}, collection=${collection}, offset=${nextOffset}, limit=${limit})}" th:text="${msg['common.next']}">Next</a>
            </span>
        </span>
        <span class="query-pagination-range" th:text="${msg['common.rowsRange'] + fromRow + '–' + toRow}"></span>
    </div>
    <div th:if="${columns != null and !columns.isEmpty()}" class="query-table-wrapper">
        <table class="query-table">
            <thead>
                <tr>
                    <th th:each="col : ${columns}" th:text="${col}">col</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row, iter : ${rows}">
                    <td th:each="cell, cstat : ${row}" th:text="${cell}">cell</td>
                    <td>
                        <a th:if="${columns[0] == 'documentId'}"
                           th:href="@{/couchbase/{id}/{bucket}/{scope}/{collection}/detail(id=${connectionId}, bucket=${bucket}, scope=${scope}, collection=${collection}, documentId=${row[0]})}"
                           th:text="${msg['common.open']}">Open</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <p th:if="${columns == null or columns.isEmpty()}" class="text-dim" th:text="${msg['common.noData']}">No data.</p>
</main>
</body>
</html>
