<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['pg.tablesAndViews']}">Tables and views</h1>
    <div th:if="${tables != null and !tables.isEmpty()}" class="query-result-data">
        <div class="query-pagination-info">
            <span class="query-pagination-nav">
                <th:block th:with="prevUrl=@{/mssql/{id}/{db}/{schema}(id=${connectionId}, db=${dbName}, schema=${schema}, page=${page - 1}, size=${size}, sort=${sort}, order=${order})}, nextUrl=@{/mssql/{id}/{db}/{schema}(id=${connectionId}, db=${dbName}, schema=${schema}, page=${page + 1}, size=${size}, sort=${sort}, order=${order})}, prevLabel=${msg['common.prev']}, nextLabel=${msg['common.next']}">
                    <th:block th:replace="~{fragments/pagination-list-nav :: arrows(hasPrev=${hasPrev}, prevUrl=${prevUrl}, hasMore=${hasMore}, nextUrl=${nextUrl}, prevLabel=${prevLabel}, nextLabel=${nextLabel})}" />
                </th:block>
            </span>
            <span class="query-pagination-range" th:text="${msg['common.rowsRange'] + fromRow + 'â€“' + toRow}"></span>
        </div>
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/mssql/{id}/{db}/{schema}(id=${connectionId}, db=${dbName}, schema=${schema}, page=1, size=${size}, sort='name', order=${orderName})}" class="query-th-link"><span th:text="${msg['common.name']}">Name</span> <span th:if="${sort == 'name' and order == 'asc'}" class="query-sort-ind">â–²</span><span th:if="${sort == 'name' and order == 'desc'}" class="query-sort-ind">â–¼</span></a>
                        </th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/mssql/{id}/{db}/{schema}(id=${connectionId}, db=${dbName}, schema=${schema}, page=1, size=${size}, sort='type', order=${orderType})}" class="query-th-link"><span th:text="${msg['common.type']}">Type</span> <span th:if="${sort == 'type' and order == 'asc'}" class="query-sort-ind">â–²</span><span th:if="${sort == 'type' and order == 'desc'}" class="query-sort-ind">â–¼</span></a>
                        </th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/mssql/{id}/{db}/{schema}(id=${connectionId}, db=${dbName}, schema=${schema}, page=1, size=${size}, sort='rows', order=${orderRows})}" class="query-th-link"><span th:text="${msg['pg.rowsApprox']}">Rows â‰ˆ</span> <span th:if="${sort == 'rows' and order == 'asc'}" class="query-sort-ind">â–²</span><span th:if="${sort == 'rows' and order == 'desc'}" class="query-sort-ind">â–¼</span></a>
                        </th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/mssql/{id}/{db}/{schema}(id=${connectionId}, db=${dbName}, schema=${schema}, page=1, size=${size}, sort='size', order=${orderSize})}" class="query-th-link"><span th:text="${msg['common.size']}">Size</span> <span th:if="${sort == 'size' and order == 'asc'}" class="query-sort-ind">â–²</span><span th:if="${sort == 'size' and order == 'desc'}" class="query-sort-ind">â–¼</span></a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tables}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="@{/mssql/{id}/{dbName}/{schema}/{table}(id=${connectionId}, dbName=${dbName}, schema=${schema}, table=${t.name})}"
                               class="query-detail-link" th:attr="aria-label=${msg['common.open']}, title=${msg['common.open']}">
                                <svg class="icon-link" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
                            </a>
                        </td>
                        <td th:text="${t.name}"></td>
                        <td th:text="${t.type}"></td>
                        <td th:text="${t.approximateRowCount}" class="query-cell-mono"></td>
                        <td th:text="${t.sizeOnDiskFormatted}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${tables == null or tables.isEmpty()}" class="text-dim" th:text="${msg['common.noTablesOrError']}">No tables or views or connection error.</p>
</main>
</body>
</html>
