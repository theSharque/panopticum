<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <div th:replace="~{fragments/app-alert :: slot}"></div>

    <th:block th:if="${podDesc != null}">
        <h1 th:text="${podDesc.name}">Pod</h1>
        <div class="detail-grid">
            <div class="detail-field"><span class="detail-label" th:text="${msg['kubernetes.phase']}">Phase</span><span th:text="${podDesc.phase}"></span></div>
            <div class="detail-field"><span class="detail-label">Node</span><span th:text="${podDesc.nodeName}"></span></div>
            <div class="detail-field"><span class="detail-label">Pod IP</span><span th:text="${podDesc.podIP}"></span></div>
        </div>

        <h2 th:text="${msg['kubernetes.ready']}">Containers</h2>
        <table class="query-table" th:if="${!podDesc.containers.isEmpty()}">
            <thead>
                <tr>
                    <th class="query-th" th:text="${msg['kubernetes.name']}">Name</th>
                    <th class="query-th" th:text="${msg['kubernetes.image']}">Image</th>
                    <th class="query-th" th:text="${msg['kubernetes.ready']}">Ready</th>
                    <th class="query-th" th:text="${msg['kubernetes.restarts']}">Restarts</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${podDesc.containers}" class="query-data-row">
                    <td th:text="${c.name}" class="query-cell-mono"></td>
                    <td th:text="${c.image}" class="query-cell-mono"></td>
                    <td th:text="${c.ready ? '✓' : '✗'}"></td>
                    <td th:text="${c.restartCount}"></td>
                </tr>
            </tbody>
        </table>

        <h2 th:text="${msg['kubernetes.eventsTitle']}">Events</h2>
        <table class="query-table" th:if="${!podDesc.recentEvents.isEmpty()}">
            <thead>
                <tr>
                    <th class="query-th">Type</th>
                    <th class="query-th" th:text="${msg['kubernetes.reason']}">Reason</th>
                    <th class="query-th" th:text="${msg['kubernetes.message']}">Message</th>
                    <th class="query-th" th:text="${msg['kubernetes.count']}">Count</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${podDesc.recentEvents}" class="query-data-row">
                    <td th:text="${e.type}" class="query-cell-mono"></td>
                    <td th:text="${e.reason}" class="query-cell-mono"></td>
                    <td th:text="${e.message}"></td>
                    <td th:text="${e.count}"></td>
                </tr>
            </tbody>
        </table>
        <p th:if="${podDesc.recentEvents.isEmpty()}" class="text-dim" th:text="${msg['kubernetes.noItems']}"></p>

        <div class="detail-actions" style="margin-top:1rem">
            <a th:href="@{/kubernetes/{id}/namespaces/{ns}/pods/{p}/logs(id=${connectionId}, ns=${namespace}, p=${podName})}+?tail=500"
               class="btn-secondary" th:text="${msg['kubernetes.logsTitle']}">Logs</a>
        </div>
    </th:block>
</main>
</body>
</html>
