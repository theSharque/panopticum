<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['kubernetes.secretsTitle']}">Secrets</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th" th:text="${msg['kubernetes.name']}">Name</th>
                        <th class="query-th" th:text="${msg['kubernetes.type']}">Type</th>
                        <th class="query-th" th:text="${msg['kubernetes.keys']}">Keys</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sec : ${items}" class="query-data-row">
                        <td th:text="${sec.name}" class="query-cell-mono"></td>
                        <td th:text="${sec.type}" class="query-cell-mono"></td>
                        <td class="query-cell-mono">
                            <span th:each="k, iter : ${sec.keys}">
                                <span th:text="${k}"></span>
                                <span th:if="${!iter.last}">, </span>
                                <span id="'reveal-' + ${sec.name} + '-' + ${k}"
                                      hx-get="@{/kubernetes/{id}/namespaces/{ns}/secrets/{n}/value(id=${connectionId},ns=${namespace},n=${sec.name})}+?key={k}"
                                      hx-target="'#reveal-' + ${sec.name} + '-' + ${k}"
                                      hx-swap="outerHTML"
                                      style="cursor:pointer;text-decoration:underline;margin-left:4px"
                                      th:text="${msg['kubernetes.reveal']}"></span>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['kubernetes.noItems']}"></p>
</main>
</body>
</html>
