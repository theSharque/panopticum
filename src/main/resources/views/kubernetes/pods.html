<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['kubernetes.podsTitle']}">Pods</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-pagination-info">
            <span class="query-pagination-nav">
                <th:block th:with="prevUrl=@{/kubernetes/{id}/namespaces/{ns}/pods(id=${connectionId}, ns=${namespace}, page=${page - 1}, size=${size}, sort=${sort}, order=${order})}, nextUrl=@{/kubernetes/{id}/namespaces/{ns}/pods(id=${connectionId}, ns=${namespace}, page=${page + 1}, size=${size}, sort=${sort}, order=${order})}, prevLabel=${msg['common.prev']}, nextLabel=${msg['common.next']}">
                    <th:block th:replace="~{fragments/pagination-list-nav :: arrows(hasPrev=${hasPrev}, prevUrl=${prevUrl}, hasMore=${hasMore}, nextUrl=${nextUrl}, prevLabel=${prevLabel}, nextLabel=${nextLabel})}" />
                </th:block>
            </span>
            <span class="query-pagination-range" th:text="${msg['common.rowsRange'] + fromRow + 'â€“' + toRow}"></span>
        </div>
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/kubernetes/{id}/namespaces/{ns}/pods(id=${connectionId}, ns=${namespace}, page=1, size=${size}, sort='name', order=${orderName})}" class="query-th-link"><span th:text="${msg['kubernetes.pod']}">Pod</span> <span th:if="${sort == 'name' and order == 'asc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-asc"/></svg></span><span th:if="${sort == 'name' and order == 'desc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-desc"/></svg></span></a>
                        </th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/kubernetes/{id}/namespaces/{ns}/pods(id=${connectionId}, ns=${namespace}, page=1, size=${size}, sort='phase', order=${orderPhase})}" class="query-th-link"><span th:text="${msg['kubernetes.phase']}">Phase</span> <span th:if="${sort == 'phase' and order == 'asc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-asc"/></svg></span><span th:if="${sort == 'phase' and order == 'desc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-desc"/></svg></span></a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="@{/kubernetes/{id}/namespaces/{ns}/pods/{p}/logs(id=${connectionId}, ns=${namespace}, p=${item.name})} + '?tail=500'" class="btn btn--icon btn--ghost" th:attr="aria-label=${msg['common.open']}, title=${msg['common.open']}">
                                <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                            </a>
                        </td>
                        <td th:text="${item.name}" class="query-cell-mono"></td>
                        <td th:text="${item.phase}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['kubernetes.noPods']}">No pods.</p>
</main>
</body>
</html>
