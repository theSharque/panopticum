<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['kubernetes.eventsTitle']}">Events</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th">Type</th>
                        <th class="query-th" th:text="${msg['kubernetes.reason']}">Reason</th>
                        <th class="query-th" th:text="${msg['kubernetes.objectName']}">Object</th>
                        <th class="query-th" th:text="${msg['kubernetes.message']}">Message</th>
                        <th class="query-th" th:text="${msg['kubernetes.count']}">Count</th>
                        <th class="query-th" th:text="${msg['kubernetes.age']}">Last</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${items}" class="query-data-row">
                        <td th:text="${e.type}" class="query-cell-mono" th:classappend="${e.type == 'Warning'} ? 'text-warn' : ''"></td>
                        <td th:text="${e.reason}" class="query-cell-mono"></td>
                        <td th:text="${e.objectKind + '/' + e.objectName}" class="query-cell-mono"></td>
                        <td th:text="${e.message}"></td>
                        <td th:text="${e.count}"></td>
                        <td th:text="${e.lastTime}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['kubernetes.noItems']}"></p>
</main>
</body>
</html>
