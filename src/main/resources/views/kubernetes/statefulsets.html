<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['kubernetes.statefulsetsTitle']}">StatefulSets</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th" th:text="${msg['kubernetes.name']}">Name</th>
                        <th class="query-th" th:text="${msg['kubernetes.replicas']}">Desired</th>
                        <th class="query-th" th:text="${msg['kubernetes.ready']}">Ready</th>
                        <th class="query-th" th:text="${msg['kubernetes.image']}">Image</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ss : ${items}" class="query-data-row">
                        <td th:text="${ss.name}" class="query-cell-mono"></td>
                        <td th:text="${ss.desiredReplicas}"></td>
                        <td th:text="${ss.readyReplicas + '/' + ss.desiredReplicas}"></td>
                        <td th:text="${ss.image}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['kubernetes.noItems']}"></p>
</main>
</body>
</html>
