<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <h1 th:text="${msg['settings.title']}">Add connection</h1>

    <div id="validation-messages" hidden
         th:attr="data-name-trailing-slash=${msg['connection.nameTrailingSlash']},
                  data-name-duplicate=${msg['connection.nameDuplicate']}"></div>

    <div th:if="${!adminLock}">
        <div class="form-group">
            <label for="connection-type" th:text="${msg['settings.connectionType']}">Connection type</label>
            <select id="connection-type" class="connection-type-select" th:attr="data-initial-type=${editingConnection != null ? editingConnection.type : null}">
                <option value="" th:text="${msg['settings.selectType']}">Select type</option>
                <option value="postgresql">PostgreSQL</option>
                <option value="greenplum">Greenplum</option>
                <option value="yugabytedb">YugabyteDB</option>
                <option value="cockroachdb">CockroachDB</option>
                <option value="mongodb">MongoDB</option>
                <option value="redis">Redis / Dragonfly / Valkey / KeyDB</option>
                <option value="clickhouse">ClickHouse</option>
                <option value="mysql">MySQL / MariaDB</option>
                <option value="sqlserver">MS SQL Server</option>
                <option value="oracle">Oracle Database</option>
                <option value="cassandra">Cassandra / ScyllaDB</option>
                <option value="rabbitmq">RabbitMQ</option>
                <option value="kafka">Kafka</option>
                <option value="elasticsearch">Elasticsearch / OpenSearch</option>
                <option value="kubernetes">Kubernetes</option>
                <option value="s3">S3 / MinIO</option>
                <option value="prometheus">Prometheus / VictoriaMetrics</option>
                <option value="h2">H2 (TCP server)</option>
                <option value="hsqldb">HSQLDB (HyperSQL)</option>
                <option value="derby">Apache Derby (network)</option>
                <option value="couchbase">Couchbase</option>
            </select>
        </div>

        <div th:replace="~{settings/fragments/form-postgres :: form-postgres}"></div>
        <div th:replace="~{settings/fragments/form-greenplum :: form-greenplum}"></div>
        <div th:replace="~{settings/fragments/form-yugabytedb :: form-yugabytedb}"></div>
        <div th:replace="~{settings/fragments/form-cockroachdb :: form-cockroachdb}"></div>
        <div th:replace="~{settings/fragments/form-mongo :: form-mongo}"></div>
        <div th:replace="~{settings/fragments/form-redis :: form-redis}"></div>
        <div th:replace="~{settings/fragments/form-clickhouse :: form-clickhouse}"></div>
        <div th:replace="~{settings/fragments/form-mysql :: form-mysql}"></div>
        <div th:replace="~{settings/fragments/form-sqlserver :: form-sqlserver}"></div>
        <div th:replace="~{settings/fragments/form-oracle :: form-oracle}"></div>
        <div th:replace="~{settings/fragments/form-cassandra :: form-cassandra}"></div>
        <div th:replace="~{settings/fragments/form-rabbitmq :: form-rabbitmq}"></div>
        <div th:replace="~{settings/fragments/form-kafka :: form-kafka}"></div>
        <div th:replace="~{settings/fragments/form-elasticsearch :: form-elasticsearch}"></div>
        <div th:replace="~{settings/fragments/form-kubernetes :: form-kubernetes}"></div>
        <div th:replace="~{settings/fragments/form-s3 :: form-s3}"></div>
        <div th:replace="~{settings/fragments/form-prometheus :: form-prometheus}"></div>
        <div th:replace="~{settings/fragments/form-h2 :: form-h2}"></div>
        <div th:replace="~{settings/fragments/form-hsqldb :: form-hsqldb}"></div>
        <div th:replace="~{settings/fragments/form-derby :: form-derby}"></div>
        <div th:replace="~{settings/fragments/form-couchbase :: form-couchbase}"></div>

        <script>
            (function () {
                var select = document.getElementById('connection-type');
                var initial = select.getAttribute('data-initial-type');
                if (initial) {
                    select.value = initial;
                }
                function handleChange() {
                    var type = select.value;
                    document.getElementById('form-postgres').hidden = type !== 'postgresql';
                    document.getElementById('form-greenplum').hidden = type !== 'greenplum';
                    document.getElementById('form-yugabytedb').hidden = type !== 'yugabytedb';
                    document.getElementById('form-cockroachdb').hidden = type !== 'cockroachdb';
                    document.getElementById('form-mongo').hidden = type !== 'mongodb';
                    document.getElementById('form-redis').hidden = type !== 'redis';
                    document.getElementById('form-clickhouse').hidden = type !== 'clickhouse';
                    document.getElementById('form-mysql').hidden = type !== 'mysql';
                    document.getElementById('form-sqlserver').hidden = type !== 'sqlserver';
                    document.getElementById('form-oracle').hidden = type !== 'oracle';
                    document.getElementById('form-cassandra').hidden = type !== 'cassandra';
                    document.getElementById('form-rabbitmq').hidden = type !== 'rabbitmq';
                    document.getElementById('form-kafka').hidden = type !== 'kafka';
                    document.getElementById('form-elasticsearch').hidden = type !== 'elasticsearch';
                    document.getElementById('form-kubernetes').hidden = type !== 'kubernetes';
                    document.getElementById('form-s3').hidden = type !== 's3';
                    document.getElementById('form-prometheus').hidden = type !== 'prometheus';
                    document.getElementById('form-h2').hidden = type !== 'h2';
                    document.getElementById('form-hsqldb').hidden = type !== 'hsqldb';
                    document.getElementById('form-derby').hidden = type !== 'derby';
                    document.getElementById('form-couchbase').hidden = type !== 'couchbase';
                }
                select.addEventListener('change', handleChange);
                if (initial) {
                    handleChange();
                }
            })();
        </script>
    </div>

    <p th:if="${adminLock}" th:text="${msg['settings.adminLockEnabled']}">Connections editing is locked by admin.</p>

    <h2 th:text="${msg['settings.addedConnections']}">Saved connections</h2>
    <p th:text="${msg['settings.connectionsInMenu']}">Connections are shown in the menu on the left.</p>
</main>
</body>
</html>
