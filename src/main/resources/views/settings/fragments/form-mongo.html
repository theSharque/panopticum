<div xmlns:th="http://www.thymeleaf.org" id="form-mongo" class="connection-form-block" hidden th:fragment="form-mongo">
    <form id="connection-form-mongo" action="/settings/add-mongo" method="post" class="add-connection-form"
          hx-post="/settings/add-mongo"
          hx-target="#sidebar"
          hx-swap="outerHTML">
        <input type="hidden" name="id" th:if="${editingConnection != null}" th:value="${editingConnection != null ? editingConnection.id : null}">
        <div class="form-group">
            <label for="name-mongo" th:text="${msg['common.name']}">Name</label>
            <input type="text" id="name-mongo" name="name" required th:attr="placeholder=${msg['settings.placeholderNameMongo']}" th:value="${editingConnection != null ? editingConnection.name : null}">
        </div>
        <div class="form-group">
            <label for="host-mongo" th:text="${msg['settings.host']}">Host</label>
            <input type="text" id="host-mongo" name="host" required placeholder="localhost" th:value="${editingConnection != null ? editingConnection.host : 'localhost'}">
        </div>
        <div class="form-group">
            <label for="port-mongo" th:text="${msg['settings.port']}">Port</label>
            <input type="number" id="port-mongo" name="port" th:value="${editingConnection != null ? editingConnection.port : 27017}">
        </div>
        <div class="form-group">
            <label for="database-mongo" th:text="${msg['settings.database']}">Database</label>
            <input type="text" id="database-mongo" name="database" placeholder="admin" th:value="${editingConnection != null ? editingConnection.dbName : null}">
        </div>
        <div class="form-group">
            <label for="username-mongo" th:text="${msg['settings.username']}">Username</label>
            <input type="text" id="username-mongo" name="username" placeholder="user" th:value="${editingConnection != null ? editingConnection.username : null}">
        </div>
        <div class="form-group">
            <label for="password-mongo" th:text="${msg['settings.password']}">Password</label>
            <input type="password" id="password-mongo" name="password" placeholder="password">
        </div>
        <div class="form-actions">
            <span id="test-indicator-mongo" class="connection-test-indicator" aria-hidden="true" th:text="${msg['settings.testing']}">Checking...</span>
            <button type="button" class="btn-check"
                    hx-post="/settings/test-mongo"
                    hx-include="#connection-form-mongo"
                    hx-target="#connection-test-result-mongo"
                    hx-swap="innerHTML show:bottom"
                    hx-indicator="#test-indicator-mongo"
                    th:text="${msg['settings.test']}">Test</button>
            <button type="submit" th:text="${editingConnection != null ? msg['settings.save'] : msg['settings.add']}">Add</button>
        </div>
        <div id="connection-test-result-mongo" class="connection-test-result"></div>
    </form>
</div>
