<div xmlns:th="http://www.thymeleaf.org" id="form-greenplum" class="connection-form-block" hidden th:fragment="form-greenplum">
    <form id="connection-form-greenplum" action="/settings/add-greenplum" method="post" class="add-connection-form"
          hx-post="/settings/add-greenplum"
          hx-target="#sidebar"
          hx-swap="outerHTML">
        <input type="hidden" name="id" th:if="${editingConnection != null}" th:value="${editingConnection != null ? editingConnection.id : null}">
        <div class="form-group">
            <label for="name-gp" th:text="${msg['common.name']}">Name</label>
            <input type="text" id="name-gp" name="name" required th:attr="placeholder=${msg['settings.placeholderNameGreenplum']}" th:value="${editingConnection != null ? editingConnection.name : null}">
        </div>
        <div class="form-group">
            <label for="host-gp" th:text="${msg['settings.host']}">Host</label>
            <input type="text" id="host-gp" name="host" required placeholder="localhost" th:value="${editingConnection != null ? editingConnection.host : 'localhost'}">
        </div>
        <div class="form-group">
            <label for="port-gp" th:text="${msg['settings.port']}">Port</label>
            <input type="number" id="port-gp" name="port" th:value="${editingConnection != null ? editingConnection.port : 5432}">
        </div>
        <div class="form-group">
            <label for="database-gp" th:text="${msg['settings.database']}">Database</label>
            <input type="text" id="database-gp" name="database" required placeholder="mydb" th:value="${editingConnection != null ? editingConnection.dbName : null}">
        </div>
        <div class="form-group">
            <label for="username-gp" th:text="${msg['settings.username']}">Username</label>
            <input type="text" id="username-gp" name="username" required placeholder="user" th:value="${editingConnection != null ? editingConnection.username : null}">
        </div>
        <div class="form-group">
            <label for="password-gp" th:text="${msg['settings.password']}">Password</label>
            <input type="password" id="password-gp" name="password" placeholder="password">
        </div>
        <div class="form-actions">
            <span id="test-indicator-gp" class="connection-test-indicator" aria-hidden="true" th:text="${msg['settings.testing']}">Checking...</span>
            <button type="button" class="btn-check"
                    hx-post="/settings/test-greenplum"
                    hx-include="#connection-form-greenplum"
                    hx-target="#connection-test-result-greenplum"
                    hx-swap="innerHTML show:bottom"
                    hx-indicator="#test-indicator-gp"
                    th:text="${msg['settings.test']}">Test</button>
            <button type="submit" class="btn btn--primary" th:text="${editingConnection != null ? msg['settings.save'] : msg['settings.add']}">Add</button>
        </div>
        <div id="connection-test-result-greenplum" class="connection-test-result"></div>
    </form>
</div>
