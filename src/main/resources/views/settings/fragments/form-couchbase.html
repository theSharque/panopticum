<div xmlns:th="http://www.thymeleaf.org" id="form-couchbase" class="connection-form-block" hidden th:fragment="form-couchbase">
    <form id="connection-form-couchbase" action="/settings/add-couchbase" method="post" class="add-connection-form"
          hx-post="/settings/add-couchbase"
          hx-target="#sidebar"
          hx-swap="outerHTML">
        <input type="hidden" name="id" th:if="${editingConnection != null}" th:value="${editingConnection != null ? editingConnection.id : null}">
        <div class="form-group">
            <label for="name-cb" th:text="${msg['common.name']}">Name</label>
            <input type="text" id="name-cb" name="name" required th:attr="placeholder=${msg['settings.placeholderNameCouchbase']}" th:value="${editingConnection != null ? editingConnection.name : null}">
        </div>
        <div class="form-group">
            <label for="host-cb" th:text="${msg['settings.host']}">Host</label>
            <input type="text" id="host-cb" name="host" required th:attr="placeholder=${msg['settings.couchbaseHostHelp']}" th:value="${editingConnection != null ? editingConnection.host : 'localhost'}">
        </div>
        <div class="form-group">
            <label for="port-cb" th:text="${msg['settings.port']}">Port</label>
            <input type="number" id="port-cb" name="port" th:value="${editingConnection != null ? editingConnection.port : 11210}">
        </div>
        <div class="form-group">
            <label for="database-cb" th:text="${msg['settings.database']}">Database</label>
            <input type="text" id="database-cb" name="database" th:attr="placeholder=${msg['settings.couchbaseBucketHelp']}" th:value="${editingConnection != null ? editingConnection.dbName : null}">
        </div>
        <div class="form-group">
            <label for="username-cb" th:text="${msg['settings.username']}">Username</label>
            <input type="text" id="username-cb" name="username" required th:value="${editingConnection != null ? editingConnection.username : null}">
        </div>
        <div class="form-group">
            <label for="password-cb" th:text="${msg['settings.password']}">Password</label>
            <input type="password" id="password-cb" name="password" autocomplete="off">
        </div>
        <div class="form-group form-group--checkbox">
            <label>
                <input type="checkbox" name="useHttps" th:checked="${editingConnection != null ? editingConnection.useHttps : false}">
                <span th:text="${msg['settings.couchbaseTls']}">TLS</span>
            </label>
        </div>
        <div class="form-actions">
            <span id="test-indicator-cb" class="connection-test-indicator" aria-hidden="true" th:text="${msg['settings.testing']}">Checking...</span>
            <button type="button" class="btn-check"
                    hx-post="/settings/test-couchbase"
                    hx-include="#connection-form-couchbase"
                    hx-target="#connection-test-result-cb"
                    hx-swap="innerHTML show:bottom"
                    hx-indicator="#test-indicator-cb"
                    th:text="${msg['settings.test']}">Test</button>
            <button type="submit" class="btn btn--primary" th:text="${editingConnection != null ? msg['settings.save'] : msg['settings.add']}">Add</button>
        </div>
        <div id="connection-test-result-cb" class="connection-test-result"></div>
    </form>
</div>
