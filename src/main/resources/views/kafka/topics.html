<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['kafka.topicsTitle']}">Topics</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-pagination-info">
            <span class="query-pagination-nav">
                <th:block th:with="prevUrl=@{/kafka/{id}/topics(id=${connectionId}, page=${page - 1}, size=${size}, sort=${sort}, order=${order})}, nextUrl=@{/kafka/{id}/topics(id=${connectionId}, page=${page + 1}, size=${size}, sort=${sort}, order=${order})}, prevLabel=${msg['common.prev']}, nextLabel=${msg['common.next']}">
                    <th:block th:replace="~{fragments/pagination-list-nav :: arrows(hasPrev=${hasPrev}, prevUrl=${prevUrl}, hasMore=${hasMore}, nextUrl=${nextUrl}, prevLabel=${prevLabel}, nextLabel=${nextLabel})}" />
                </th:block>
            </span>
            <span class="query-pagination-range" th:text="${msg['common.rowsRange'] + fromRow + 'â€“' + toRow}"></span>
        </div>
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/kafka/{id}/topics(id=${connectionId}, page=1, size=${size}, sort='name', order=${orderName})}" class="query-th-link"><span th:text="${msg['common.name']}">Name</span> <span th:if="${sort == 'name' and order == 'asc'}" class="query-sort-ind">â–˛</span><span th:if="${sort == 'name' and order == 'desc'}" class="query-sort-ind">â–Ľ</span></a>
                        </th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/kafka/{id}/topics(id=${connectionId}, page=1, size=${size}, sort='partitionCount', order=${orderPartitionCount})}" class="query-th-link"><span th:text="${msg['kafka.partitions']}">Partitions</span> <span th:if="${sort == 'partitionCount' and order == 'asc'}" class="query-sort-ind">â–˛</span><span th:if="${sort == 'partitionCount' and order == 'desc'}" class="query-sort-ind">â–Ľ</span></a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="@{/kafka/{id}/topics/{t}/partitions(id=${connectionId}, t=${item.name})}" class="query-detail-link" th:attr="aria-label=${msg['common.open']}, title=${msg['common.open']}">
                                <svg class="icon-link" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
                            </a>
                        </td>
                        <td th:text="${item.name}" class="query-cell-mono"></td>
                        <td th:text="${item.partitionCount}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['kafka.noTopics']}">No topics or connection error.</p>
</main>
</body>
</html>
