<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['s3.bucketsTitle']}">Buckets</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th" th:text="${msg['s3.bucket']}">Bucket</th>
                        <th class="query-th" th:text="${msg['s3.lastModified']}">Created</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${items}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="@{/s3/{id}/buckets/{bucket}(id=${connectionId},bucket=${b.name})}"
                               class="btn btn--icon btn--ghost">
                                <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                            </a>
                        </td>
                        <td th:text="${b.name}" class="query-cell-mono"></td>
                        <td th:text="${b.createdAt}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['s3.noBuckets']}"></p>
</main>
</body>
</html>
