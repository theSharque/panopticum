<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['s3.objectsTitle']}">Objects</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-pagination-info">
            <span class="query-pagination-nav">
                <th:block th:with="prevUrl=@{/s3/{id}/buckets/{bucket}(id=${connectionId},bucket=${bucket},prefix=${prefix},page=${page - 1},size=${size})}, nextUrl=@{/s3/{id}/buckets/{bucket}(id=${connectionId},bucket=${bucket},prefix=${prefix},page=${page + 1},size=${size})}, prevLabel=${msg['common.prev']}, nextLabel=${msg['common.next']}">
                    <th:block th:replace="~{fragments/pagination-list-nav :: arrows(hasPrev=${hasPrev}, prevUrl=${prevUrl}, hasMore=${hasMore}, nextUrl=${nextUrl}, prevLabel=${prevLabel}, nextLabel=${nextLabel})}" />
                </th:block>
            </span>
        </div>
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th" th:text="${msg['s3.key']}">Key</th>
                        <th class="query-th" th:text="${msg['s3.size']}">Size</th>
                        <th class="query-th" th:text="${msg['s3.lastModified']}">Modified</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="obj : ${items}" class="query-data-row">
                        <td class="query-detail-cell">
                            <th:block th:if="${!obj.prefix}">
                                <a th:href="@{/s3/{id}/buckets/{bucket}/peek(id=${connectionId},bucket=${bucket},key=${obj.key})}"
                                   class="btn btn--icon btn--ghost">
                                    <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                                </a>
                            </th:block>
                            <th:block th:if="${obj.prefix}">
                                <a th:href="@{/s3/{id}/buckets/{bucket}(id=${connectionId},bucket=${bucket},prefix=${obj.key})}"
                                   class="btn btn--icon btn--ghost">
                                    <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                                </a>
                            </th:block>
                        </td>
                        <td th:text="${obj.key}" class="query-cell-mono"></td>
                        <td th:text="${obj.prefix ? '' : obj.size}" class="query-cell-mono"></td>
                        <td th:text="${obj.prefix ? '—' : obj.lastModified}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['s3.noObjects']}"></p>
</main>
</body>
</html>
