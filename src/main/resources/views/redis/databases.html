<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head></head>
<body>
<main th:fragment="main" class="main-content">
    <div th:replace="~{fragments/page-heading :: pageHeading(items=${breadcrumbs})}"></div>
    <h1 th:text="${msg['databases.title']}">Databases</h1>
    <div th:if="${items != null and !items.isEmpty()}" class="query-result-data">
        <div class="query-table-wrapper">
            <table class="query-table">
                <thead>
                    <tr>
                        <th class="query-th query-th-detail"></th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/redis/{id}(id=${connectionId}, sort='dbIndex', order=${orderDbIndex})}" class="query-th-link"><span th:text="${msg['redis.dbNumber']}">DB number</span> <span th:if="${sort == 'dbIndex' and order == 'asc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-asc"/></svg></span><span th:if="${sort == 'dbIndex' and order == 'desc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-desc"/></svg></span></a>
                        </th>
                        <th class="query-th query-th-sortable">
                            <a th:href="@{/redis/{id}(id=${connectionId}, sort='keyCount', order=${orderKeys})}" class="query-th-link"><span th:text="${msg['redis.keyCount']}">Keys</span> <span th:if="${sort == 'keyCount' and order == 'asc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-asc"/></svg></span><span th:if="${sort == 'keyCount' and order == 'desc'}" class="query-sort-ind"><svg class="icon icon--sm" aria-hidden="true"><use href="#icon-sort-desc"/></svg></span></a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}" class="query-data-row">
                        <td class="query-detail-cell">
                            <a th:href="${itemUrlPrefix + item.dbIndex}" class="btn btn--icon btn--ghost" th:attr="aria-label=${msg['common.open']}, title=${msg['common.open']}">
                                <svg class="icon" aria-hidden="true"><use href="#icon-link"/></svg>
                            </a>
                        </td>
                        <td th:text="'DB ' + ${item.dbIndex}"></td>
                        <td th:text="${item.keyCount}" class="query-cell-mono"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <p th:if="${items == null or items.isEmpty()}" class="text-dim" th:text="${msg['common.noDatabasesOrError']}">No databases available or connection error.</p>
</main>
</body>
</html>
