<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Panopticum'">Panopticum</title>
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon" sizes="any">
    <link rel="icon" th:href="@{/favicon-32x32.png}" type="image/png" sizes="32x32">
    <link rel="icon" th:href="@{/favicon-16x16.png}" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" th:href="@{/favicon-180x180.png}" sizes="180x180">
    <link rel="stylesheet" th:href="@{/vendor/fonts/fonts.css}">
    <script th:src="@{/vendor/htmx/htmx.min.js}"></script>
    <script th:src="@{/js/detail-textarea-height.js}"></script>
    <script th:src="@{/diff.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:if="${theme == 'light'}" th:href="@{/css/style-light.css}">
    <link rel="stylesheet" th:href="@{/vendor/prism/prism-tomorrow.min.css}">
    <script th:src="@{/vendor/prism/prism.min.js}"></script>
    <script th:src="@{/vendor/prism/prism-json.min.js}"></script>
    <script th:src="@{/js/syntax-highlight.js}"></script>
    <link rel="stylesheet" th:href="@{/vendor/codemirror/view.css}">
    <script th:src="@{/js/query-editor.bundle.js}"></script>
    <script th:src="@{/js/detail-editor.bundle.js}"></script>
    <script th:src="@{/js/query-history.js}"></script>
    <script th:src="@{/js/sidebar-tree.js}"></script>
    <script th:src="@{/js/breadcrumbs-copy.js}"></script>
</head>

<body th:attr="data-theme=${theme}">
<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar(connections=${connections}, adminLock=${adminLock})}"></div>

    <div class="main-wrapper">
        <div th:replace="~{fragments/header :: header}"></div>
        <main th:replace="${content}">
        </main>
    </div>
</div>
</body>
</html>
