name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'panopticum-helm-chart/**'
      - '.github/workflows/release-helm.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Helm Index
        run: |
          mkdir -p _site
          helm package panopticum-helm-chart -d _site
          helm repo index _site --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          cp panopticum-helm-chart/artifacthub-repo.yml _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4