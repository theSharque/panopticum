name: Feature request
description: Suggest an idea or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please replace the title prefix with a short summary after you submit.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What limitation or workflow pain does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should Panopticum behave? UI sketch, API shape, or config keys welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or simpler variants.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Web UI
        - REST API
        - MCP
        - New database type or driver
        - Packaging (Docker / Helm)
        - Documentation
        - Other
    validations:
      required: true
